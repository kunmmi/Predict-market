name: Update Market Prices

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-market-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market price update
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing APP_URL GitHub secret."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET GitHub secret."
            exit 1
          fi

          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/update-market-prices"
