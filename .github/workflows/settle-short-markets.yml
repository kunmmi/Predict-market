name: Settle Short Markets

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  settle-short-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger short market settlement sweep
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing APP_URL GitHub secret."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET GitHub secret."
            exit 1
          fi

          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/settle-short-markets"
